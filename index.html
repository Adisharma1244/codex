<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- ─── SEO ─────────────────────────────────────────────────────────── -->
  <title>CompileX | AI-Powered Online Compiler</title>
  <meta name="description" content="CompileX is a free online compiler with an AI debugger. Write, run, and fix Java, Python, C++, and JavaScript code instantly with AI-powered error explanations and logic hints.">
  <meta name="keywords" content="online compiler, AI debugger, Java compiler, Python compiler, C++ compiler, JavaScript compiler, code editor, online IDE, run code online">
  <link rel="canonical" href="https://compile-x.in/">

  <!-- Open Graph -->
  <meta property="og:title" content="CompileX | AI-Powered Online Compiler">
  <meta property="og:description" content="Write, run, and debug Java, Python, C++, and JavaScript online — with an AI assistant that explains errors and guides you to logic fixes.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://compile-x.in/">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- ─── Google AdSense (loader script + account meta — head only) ────── -->
  <meta name="google-adsense-account" content="ca-pub-4580525259674341">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-4580525259674341"
          crossorigin="anonymous"></script>
</head>
<body>

  <div class="bg-grid"></div>

  <div class="app-shell">

    <!-- Header: logo + top ad banner directly to its right -->
    <header>
      <div class="header-left">
        <div class="logo">
          <span class="logo-bracket">[</span>
          <span class="logo-text">CompileX</span>
          <span class="logo-bracket">]</span>
        </div>
        <div id="top-ad-banner" class="ad-slot ad-slot-top">
          <!-- compilex top1 -->
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-4580525259674341"
               data-ad-slot="3481733949"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
      </div>
      <div class="header-meta">
        <span class="status-dot"></span>
        <span id="status-label">READY</span>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="lang-selector">
        <label>LANGUAGE</label>
        <div class="lang-pills">
          <button class="lang-pill active" data-lang="java">Java</button>
          <button class="lang-pill" data-lang="python">Python</button>
          <button class="lang-pill" data-lang="cpp">C++</button>
          <button class="lang-pill" data-lang="javascript">JavaScript</button>
        </div>
      </div>
      <div class="toolbar-actions">
        <button class="btn-reset" id="btn-reset" title="Reset to template">↺ Reset</button>
        <button class="btn-run" id="btn-run" onclick="runCode()">
          <span class="run-icon">▶</span> RUN
        </button>
      </div>
    </div>

    <!-- Main two-column layout -->
    <div class="main-grid">

      <!-- LEFT COLUMN: editor + input/output -->
      <div class="col-left">

        <div class="editor-wrapper">
          <div class="editor-label">CODE</div>
          <div id="editor"></div>
        </div>

        <div class="io-row">
          <div class="io-panel" id="input-panel">
            <div class="io-panel-bar">
              <div class="terminal-dots">
                <span class="tdot tdot-red"></span>
                <span class="tdot tdot-yellow"></span>
                <span class="tdot tdot-green"></span>
              </div>
              <span class="io-panel-title">Input</span>
              <span class="io-panel-hint">optional · fed to your program at runtime</span>
            </div>
            <textarea id="stdin-input" class="stdin-textarea" placeholder="Enter your input values here (one per line)&#10;e.g.&#10;5&#10;3"></textarea>
          </div>

          <div class="io-panel" id="output-panel">
            <div class="io-panel-bar">
              <div class="terminal-dots">
                <span class="tdot tdot-red"></span>
                <span class="tdot tdot-yellow"></span>
                <span class="tdot tdot-green"></span>
              </div>
              <span class="io-panel-title">Output</span>
              <span class="panel-badge" id="output-badge">—</span>
            </div>
            <div id="terminal" class="terminal-body">
              <div class="terminal-idle">
                <span class="terminal-prompt">▶</span>
                <span class="terminal-idle-text">Click <strong>RUN</strong> to execute your code…</span>
              </div>
            </div>
          </div>
        </div>

      </div>

      <!-- RIGHT COLUMN: ad slot + AI chat -->
      <div class="col-right">

        <div id="mid-ad-container" class="ad-slot ad-slot-mid">
          <!-- compilex_ai -->
          <ins class="adsbygoogle"
               style="display:block"
               data-ad-client="ca-pub-4580525259674341"
               data-ad-slot="8313855859"
               data-ad-format="auto"
               data-full-width-responsive="true"></ins>
          <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <div class="ai-panel" id="ai-panel">
          <div class="ai-panel-header">
            <span class="ai-panel-title"> 💻output galat hai bhai 🤷‍♂️</span>
            <span class="panel-badge ai-badge" id="ai-badge">—</span>
          </div>

          <div id="ai-chat" class="ai-chat">
            <div class="ai-idle" id="ai-idle-msg">
              <div class="ai-icon">⬡</div>
              <p>Ask the AI about your code errors or logic issues.<br>Run your code first to see AI explanations.</p>
            </div>
          </div>

          <div class="ai-chat-input-row">
            <input
              type="text"
              id="ai-chat-input"
              class="ai-chat-input"
              placeholder='Ask the AI about your code… e.g. "Sum sahi nahi ho raha hai"'
              maxlength="300"
            />
            <button class="btn-send" id="btn-send" onclick="sendChatMessage()">Send</button>
          </div>
        </div>

      </div>

    </div>

  </div>

  <!-- ══════════════════════════════════════════════════
       Interstitial ad overlay (shown every 5th RUN click)
  ═══════════════════════════════════════════════════ -->
  <div id="interstitial-overlay" class="interstitial-overlay">
    <div class="interstitial-box">
      <button class="interstitial-close" id="interstitial-close">✕</button>
      <div class="ad-slot ad-slot-interstitial">
        <!-- compileX_popup -->
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-4580525259674341"
             data-ad-slot="1957320746"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.js"></script>
  <script src="scripit.js"></script>
</body>
</html>
